name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ansible-core ${{ matrix.core }} / py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: "3.11", core: "2.15" }
          - { python: "3.12", core: "2.16" }
          - { python: "3.12", core: "2.17" }
          - { python: "3.13", core: "2.18" }
          - { python: "3.13", core: "2.19" }
          - { python: "3.13", core: "2.21" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: python -m pip install -e . pytest "ansible-core==${{ matrix.core }}.*"

      - name: Unit tests (checked-in fixture)
        run: pytest -q

      - name: Live capture on this ansible-core version
        run: |
          ANSIBLE_STDOUT_CALLBACK=playcheck_jsonl \
          ANSIBLE_CALLBACK_PLUGINS=src/playcheck/_ansible/callback_plugins \
          ansible-playbook testdata/site.yml -i testdata/inventory.ini --check --diff \
            > /tmp/capture.jsonl
          PLAYCHECK_FIXTURE=/tmp/capture.jsonl pytest -q

      - name: End-to-end CLI
        run: |
          playcheck run testdata/site.yml -i testdata/inventory.ini --no-color --quiet \
            | tee /tmp/preview.txt
          grep -q "NOT simulated" /tmp/preview.txt
          playcheck run testdata/site.yml -i testdata/inventory.ini --format markdown --quiet \
            | grep -q "playcheck-report"
