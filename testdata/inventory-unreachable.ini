# One good host and one dead SSH endpoint, to exercise unreachable rendering.
[web]
web-01 ansible_connection=local ansible_python_interpreter="{{ ansible_playbook_python }}"
web-02 ansible_host=127.0.0.1 ansible_port=1 ansible_connection=ssh

[db]
db-01 ansible_connection=local ansible_python_interpreter="{{ ansible_playbook_python }}"
